<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maestro Italiano AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              italian: {
                green: '#008C45',
                white: '#F4F5F0',
                red: '#CD212A',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* ── Base ─────────────────────────────────────────────────────── */
      body { background-color: #F8FAFC; }

      /* ── Scrollbar ────────────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

      /* ── Keyframes ────────────────────────────────────────────────── */
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes bb-flash {
        0%   { opacity: 1; }
        40%  { opacity: 0.1; }
        60%  { opacity: 0.1; }
        100% { opacity: 1; }
      }

      /* ── Utility classes ──────────────────────────────────────────── */
      .animate-fade-in     { animation: fade-in 0.3s ease-out both; }
      .animate-fade-in-up  { animation: fade-in-up 0.5s ease-out both; }
      .bb-flash            { animation: bb-flash 0.18s ease; }

      /* ── BilingualBlock interactive styles ────────────────────────── */
      .bb-clickable {
        cursor: pointer;
        border-radius: 3px;
        transition: background-color 0.12s ease, opacity 0.1s ease;
        /* Subtle dashed underline hint */
        text-decoration-line: underline;
        text-decoration-style: dotted;
        text-decoration-color: rgba(0,140,69,0.25);
        text-underline-offset: 3px;
      }
      .bb-clickable:hover {
        background-color: rgba(0, 140, 69, 0.06);
        text-decoration-color: rgba(0,140,69,0.5);
      }
      .bb-clickable:active {
        background-color: rgba(0, 140, 69, 0.14);
      }

      /* Badge shown when a block is desynced from global language */
      .bb-badge {
        display: inline-block;
        font-size: 9px;
        line-height: 1;
        margin-left: 2px;
        vertical-align: super;
        opacity: 0.7;
        pointer-events: none;
      }

      /* ── Prose overrides ──────────────────────────────────────────── */
      .prose p { margin-bottom: 0.75em; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@heroicons/react/": "https://esm.sh/@heroicons/react@^2.2.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
